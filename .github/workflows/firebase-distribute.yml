name: Build & Distribute to Firebase

on:
  push:
    branches: [master, develop, main]
  workflow_dispatch:

jobs:
  build-and-distribute:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true
      
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
            echo "✅ Keystore decoded successfully"
            ls -lh app/keystore.jks
          else
            echo "⚠️ No keystore secret found, will build unsigned APK"
          fi
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Build Debug APK
        run: |
          ./gradlew --version
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build.log || true
          
      - name: Show build errors
        if: failure()
        run: |
          echo "=== Build Log ==="
          tail -100 build.log
          echo "=== Gradle Properties ==="
          cat gradle.properties
      
      - name: Check Debug APK exists
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "✅ Debug APK built successfully"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ Debug APK not found"
            exit 1
          fi
      
      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fish-audio-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Build Signed Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee release-build.log || true
      
      - name: Check Release APK exists
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "✅ Signed Release APK built successfully"
            ls -lh app/build/outputs/apk/release/app-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "⚠️ Unsigned Release APK built"
            ls -lh app/build/outputs/apk/release/app-release-unsigned.apk
          else
            echo "❌ Release APK not found"
            exit 1
          fi
      
      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fish-audio-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
