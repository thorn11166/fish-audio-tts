name: Build APK & Release

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
          cache: 'gradle'

      - name: Setup Android SDK
        run: |
          set -e
          
          # Create Android SDK directory
          mkdir -p $ANDROID_HOME/cmdline-tools
          
          # Download Android SDK Command-line Tools
          cd /tmp
          echo "Downloading Android SDK command-line tools..."
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          
          echo "Extracting Android SDK command-line tools..."
          unzip -q commandlinetools-linux-11076708_latest.zip
          
          echo "Moving to Android SDK directory..."
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          
          # Accept licenses
          echo "Accepting Android licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Install required SDK components
          echo "Installing SDK components..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"
          
          # Set PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "Android SDK setup complete"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fish-audio-tts-debug
          path: app/build/outputs/apk/debug/

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fish-audio-tts-release
          path: app/build/outputs/apk/release/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download APKs
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fish-audio-tts-debug/**/*.apk
            fish-audio-tts-release/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
