name: Build APK & Release

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: fish-audio-tts-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Debug APK in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            fish-audio-tts-builder:latest \
            ./gradlew assembleDebug --no-daemon

      - name: Build Release APK in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            fish-audio-tts-builder:latest \
            ./gradlew assembleRelease --no-daemon

      - name: List APK files
        run: |
          echo "=== Debug APKs ==="
          find app/build/outputs/apk/debug -name "*.apk" -type f
          echo "=== Release APKs ==="
          find app/build/outputs/apk/release -name "*.apk" -type f

      - name: Upload Debug APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fish-audio-tts-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: warn

      - name: Upload Release APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fish-audio-tts-release
          path: app/build/outputs/apk/release/
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fish-audio-tts-debug/**/*.apk
            fish-audio-tts-release/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
