name: Build APK & Release

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true
          packages: tools platform-tools

      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
          ls -lh app/keystore.jks

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace --info
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Verify Debug APK
        run: |
          echo "=== Debug APK Verification ==="
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            ls -lh app/build/outputs/apk/debug/app-debug.apk
            file app/build/outputs/apk/debug/app-debug.apk
            echo "✓ Debug APK generated successfully"
          else
            echo "✗ Debug APK not found!"
            echo "Contents of app/build/outputs:"
            find app/build/outputs -type f 2>/dev/null || echo "No outputs found"
            exit 1
          fi

      - name: Upload Debug APK to Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fish-audio-tts-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: error
          retention-days: 7

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace --info

      - name: Build Signed Release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: ./gradlew assembleRelease --stacktrace --info

      - name: Build Unsigned Release APK
        if: env.KEYSTORE_BASE64 == ''
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: ./gradlew assembleRelease --stacktrace --info

      - name: Verify Release APK
        run: |
          echo "=== Release APK Verification ==="
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            ls -lh app/build/outputs/apk/release/app-release.apk
            file app/build/outputs/apk/release/app-release.apk
            echo "✓ Signed Release APK generated successfully"
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            ls -lh app/build/outputs/apk/release/app-release-unsigned.apk
            file app/build/outputs/apk/release/app-release-unsigned.apk
            echo "✓ Unsigned Release APK generated successfully"
          else
            echo "✗ Release APK not found!"
            echo "Contents of app/build/outputs:"
            find app/build/outputs -type f 2>/dev/null || echo "No outputs found"
            exit 1
          fi

      - name: Generate Build Summary
        if: always()
        run: |
          echo "=== Complete APK Summary ==="
          echo "All APK files found:"
          find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;
          echo ""
          echo "=== Build Environment ==="
          echo "JDK version:"
          java -version
          echo ""
          echo "Gradle version:"
          ./gradlew --version
          echo ""
          echo "Android SDK location: $ANDROID_HOME"

      - name: Upload Release APK to Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fish-audio-tts-release
          path: app/build/outputs/apk/release/
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fish-audio-tts-debug/**/*.apk
            fish-audio-tts-release/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
